<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Default Title - NPSNAV.in{% endblock %}</title>

    <meta name="description" content="{% block description %}Default description for NPSNAV.in.{% endblock %}">
    <link rel="canonical" href="{% block canonical %}https://npsnav.in{% endblock %}">
    <meta name="keywords" content="{% block keywords %}NPS, NAV, National Pension Scheme, fund performance, investment{% endblock %}">
    <meta name="author" content="{% block author %}NPSNAV.in{% endblock %}">
    <meta name="robots" content="{% block robots %}index, follow{% endblock %}">

    <!-- Open Graph Tags -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% block og_title %}NPSNAV.in - NPS Fund Performances{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Get the latest NAV and performance updates for NPS funds.{% endblock %}">
    <meta property="og:image" content="{% block og_image %}/assets/images/logo.png{% endblock %}">
    <meta property="og:url" content="{% block og_url %}https://npsnav.in{% endblock %}">

    <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon">

    <!-- Canonical Link -->

    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    {% include 'header.html' %}
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    {% include 'footer.html' %}
    
    <script src="/assets/js/script.js"></script>

    <script>
        function applyColoring() {
            const table = document.getElementById('fundTable');
            const rows = table.getElementsByTagName('tr');
        
            // Start from i = 1 to skip the header row
            for (let i = 1; i < rows.length; i++) {
                const cells = rows[i].getElementsByTagName('td');
                // Loop through the cells that contain return values
                for (let j = 2; j < cells.length; j++) {
                    const cell = cells[j];
                    let cellValue = cell.textContent || cell.innerText;
                    // Remove percentage sign and any whitespace
                    cellValue = cellValue.replace('%', '').trim();
                    // Convert to float
                    const value = parseFloat(cellValue);
                    // Check if value is a number
                    if (!isNaN(value)) {
                        // Remove any existing classes to prevent duplication
                        cell.classList.remove('positive-value', 'negative-value');
                        if (value > 0) {
                            cell.classList.add('positive-value');
                        } else if (value < 0) {
                            cell.classList.add('negative-value');
                        }
                    }
                }
            }
        }
        
        // Apply coloring on initial page load
        document.addEventListener("DOMContentLoaded", function() {
            applyColoring();
        });
        </script>

    {% block scripts %}{% endblock %}
</body>
</html>
